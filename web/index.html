<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="第三届CCF芯片大会 CCF Chip 2026 — 议程日程浏览（演示原型）" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>CCF Chip 2026 · 大会议程</title>
    <!-- Apply the user's stored theme before first paint to avoid a
         light/dark flash (FOUC). Must stay in sync with the "cs-theme" key
         used by src/lib/theme.tsx. "system" (or unset) falls back to the
         prefers-color-scheme media queries, so nothing to do there. -->
    <script>
      try {
        var m = localStorage.getItem("cs-theme");
        if (m === "light" || m === "dark")
          document.documentElement.setAttribute("data-theme", m);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
